services:
  # PHP-FPM + Laravel Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lacakeen-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/entrypoint.sh:/usr/local/bin/entrypoint.sh
    networks:
      - lacakeen-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: lacakeen-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - lacakeen-network
    depends_on:
      - app

  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: lacakeen-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-lacakeen}
      POSTGRES_USER: ${DB_USERNAME:-lacakeen}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lacakeen-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-lacakeen} -d ${DB_DATABASE:-lacakeen}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: lacakeen-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - lacakeen-network
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-null}

  # Reverb (Laravel WebSocket) - optional
  reverb:
    image: node:22-alpine
    container_name: lacakeen-reverb
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - lacakeen-network
    depends_on:
      - app
    command: >
      sh -c "npm install && npx laravel-reverb start"
    profiles:
      - full

  # Queue Worker
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lacakeen-queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - lacakeen-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    profiles:
      - full

  # Scheduler
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lacakeen-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - lacakeen-network
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    profiles:
      - full

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  lacakeen-network:
    driver: bridge
